<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Enid's Journal 🐺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --pink:   #E84EA0;
      --purple: #A855F7;
      --mint:   #6EE7B7;
      --amber:  #F59E0B;
      --cream:  #FFFBF7;
      --glass:  rgba(255,255,255,0.76);
      --border: rgba(168,85,247,0.13);
      --text:   #2D1B4E;
      --sub:    #7C6F9B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(ellipse at 15% 0%,   rgba(232,78,160,.18)  0%, transparent 55%),
        radial-gradient(ellipse at 85% 40%,  rgba(168,85,247,.12)  0%, transparent 55%),
        radial-gradient(ellipse at 40% 100%, rgba(110,231,183,.10) 0%, transparent 55%),
        #FFFBF7;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loader ────────────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 999; transition: opacity .35s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px}
    .loader-wrap::before{content:'';position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(232,78,160,.22) 0%,rgba(168,85,247,.12) 50%,transparent 70%);animation:glowPulse 2s ease-in-out infinite;pointer-events:none}
    @keyframes glowPulse{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.22);opacity:1}}
    .loader-nails-img{width:90px;height:90px;object-fit:contain;animation:bounce 1.1s ease-in-out infinite,nailsShimmer 3s ease-in-out infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}}
    @keyframes nailsShimmer{0%{filter:drop-shadow(0 6px 22px rgba(232,78,160,.65)) brightness(1) saturate(1)}20%{filter:drop-shadow(0 8px 26px rgba(168,85,247,.72)) brightness(1.1) saturate(1.15)}40%{filter:drop-shadow(0 9px 28px rgba(59,130,246,.62)) brightness(1.15) saturate(1.2)}60%{filter:drop-shadow(0 8px 26px rgba(16,185,129,.65)) brightness(1.1) saturate(1.15)}80%{filter:drop-shadow(0 7px 24px rgba(245,158,11,.65)) brightness(1.06) saturate(1.1)}100%{filter:drop-shadow(0 6px 22px rgba(232,78,160,.65)) brightness(1) saturate(1)}}
    .sp{position:absolute;line-height:1;pointer-events:none;animation:spTwinkle 1.8s ease-in-out infinite}
    .sp1{top:-13px;left:20px;font-size:.88rem;color:#E84EA0;animation-delay:0s}
    .sp2{top:4px;right:-15px;font-size:.72rem;color:#A855F7;animation-delay:.45s}
    .sp3{bottom:-9px;left:10px;font-size:.68rem;color:#F59E0B;animation-delay:.9s}
    .sp4{bottom:5px;right:-11px;font-size:.82rem;color:#6EE7B7;animation-delay:1.3s}
    .sp5{top:-5px;left:-13px;font-size:.62rem;color:#60A5FA;animation-delay:.65s}
    @keyframes spTwinkle{0%,100%{opacity:0;transform:scale(.2) rotate(0deg)}45%,55%{opacity:1;transform:scale(1.15) rotate(72deg)}}
    .loader-text { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--purple); }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app { max-width: 600px; margin: 0 auto; padding-bottom: 120px; }

    /* ── Header ────────────────────────────────────────────────────── */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      padding: 22px 20px 14px;
      background: linear-gradient(180deg, rgba(255,251,247,.96) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; line-height: 1.2;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-sub { font-size: .78rem; color: var(--sub); margin-top: 3px; }

    .back-btn {
      flex-shrink: 0;
      font-size: .72rem; font-weight: 700; letter-spacing: .04em;
      color: var(--sub);
      background: rgba(168,85,247,.08);
      border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px;
      text-decoration: none; white-space: nowrap; margin-top: 2px;
      transition: background .15s;
    }
    .back-btn:hover { background: rgba(168,85,247,.16); }

    /* ── Filter tabs ───────────────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px;
      padding: 0 20px 14px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      font-size: .78rem; font-weight: 600;
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--glass);
      color: var(--sub);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, transform .12s;
      white-space: nowrap;
    }
    .filter-btn:hover { background: rgba(168,85,247,.1); }
    .filter-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-color: transparent;
      color: #fff;
      transform: scale(1.03);
    }

    /* ── Feed ──────────────────────────────────────────────────────── */
    .feed { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Entry card ─────────────────────────────────────────────────── */
    .entry-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      border-left: 4px solid var(--purple);
      transition: box-shadow .15s, transform .1s;
    }
    .entry-card:hover { box-shadow: 0 4px 20px rgba(168,85,247,.1); transform: translateY(-1px); }
    .entry-card.type-journal { border-left-color: var(--pink); }
    .entry-card.type-reflection { border-left-color: var(--purple); }

    .card-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .type-badge {
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      padding: 3px 9px; border-radius: 20px;
      white-space: nowrap;
    }
    .type-badge.journal {
      background: rgba(232,78,160,.12);
      color: var(--pink);
    }
    .type-badge.reflection {
      background: rgba(168,85,247,.12);
      color: var(--purple);
    }

    .habit-badge {
      font-size: .7rem; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      background: rgba(168,85,247,.08);
      color: var(--purple);
      white-space: nowrap; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis;
    }

    .date-chip {
      font-size: .7rem; color: var(--sub); font-weight: 500;
      margin-left: auto;
    }

    .mood-chip {
      font-size: .75rem; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      background: rgba(245,158,11,.12);
      color: #b45309;
      white-space: nowrap;
    }

    .card-body {
      font-size: .9rem; line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }
    .tag-chip {
      font-size: .67rem; font-weight: 600; letter-spacing: .03em;
      padding: 3px 9px; border-radius: 12px;
      background: rgba(110,231,183,.18);
      color: #065f46;
    }

    /* ── Card action buttons (journal only) ─────────────────────────── */
    .card-actions {
      display: flex; justify-content: flex-end; gap: 6px;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .icon-btn {
      font-size: .72rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: background .14s, color .14s;
      letter-spacing: .02em;
    }
    .icon-btn.edit {
      color: var(--purple);
    }
    .icon-btn.edit:hover { background: rgba(168,85,247,.12); }
    .icon-btn.delete {
      color: #dc2626;
    }
    .icon-btn.delete:hover { background: rgba(220,38,38,.09); border-color: rgba(220,38,38,.2); }
    .icon-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Date group separator ───────────────────────────────────────── */
    .date-separator {
      display: flex; align-items: center; gap: 10px;
      font-size: .68rem; font-weight: 700; letter-spacing: .06em;
      color: var(--sub); text-transform: uppercase;
      padding: 4px 2px 0; pointer-events: none; user-select: none;
    }
    .date-separator::before,
    .date-separator::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── Reflection source footer ───────────────────────────────────── */
    .reflection-source {
      font-size: .65rem; color: var(--sub);
      margin-top: 9px; opacity: .75;
    }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px 40px;
      color: var(--sub);
    }
    .empty-icon { font-size: 2.6rem; margin-bottom: 12px; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: .82rem; line-height: 1.5; }

    /* ── FAB — New Entry ────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 28px; right: 20px;
      z-index: 60;
      display: flex; align-items: center; gap: 7px;
      padding: 13px 22px;
      border-radius: 30px;
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 700;
      letter-spacing: .03em;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 4px 18px rgba(232,78,160,.35), 0 2px 8px rgba(0,0,0,.12);
      transition: transform .14s, box-shadow .14s;
    }
    .fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,78,160,.45), 0 2px 10px rgba(0,0,0,.14); }
    .fab:active { transform: scale(.97); }

    /* ── Entry overlay ──────────────────────────────────────────────── */
    #entryOverlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      background: rgba(45,27,78,.45);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity .22s ease;
    }
    #entryOverlay.open { opacity: 1; pointer-events: all; }

    .overlay-panel {
      width: 100%; max-width: 600px;
      background: #FFFBF7;
      border-radius: 22px 22px 0 0;
      padding: 28px 24px 40px;
      transform: translateY(30px);
      transition: transform .25s cubic-bezier(.34,1.35,.7,1);
      max-height: 90vh; overflow-y: auto;
    }
    #entryOverlay.open .overlay-panel { transform: translateY(0); }

    .overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    /* ── Form fields ────────────────────────────────────────────────── */
    .form-field { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: .75rem; font-weight: 700;
      color: var(--sub); letter-spacing: .04em; margin-bottom: 6px;
    }
    .form-label span { font-weight: 400; opacity: .7; } /* "(optional)" */

    .form-input, .form-textarea {
      width: 100%; border-radius: 12px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,.8);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(232,78,160,.12);
    }
    .form-textarea {
      resize: vertical; min-height: 140px; line-height: 1.6;
    }

    /* ── Form actions ───────────────────────────────────────────────── */
    .form-actions {
      display: flex; gap: 10px; margin-top: 22px;
    }
    .btn-cancel {
      flex: 0 0 auto;
      padding: 11px 20px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 600; color: var(--sub);
      cursor: pointer; transition: background .14s;
    }
    .btn-cancel:hover { background: rgba(168,85,247,.08); }

    .btn-save {
      flex: 1;
      padding: 11px 20px; border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 700; color: #fff;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(232,78,160,.3);
      transition: opacity .14s, transform .12s;
    }
    .btn-save:hover { opacity: .9; transform: translateY(-1px); }
    .btn-save:active { transform: scale(.98); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .form-error {
      font-size: .78rem; color: #dc2626;
      margin-top: 8px; display: none;
    }
    .form-error.show { display: block; }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-wrap">
    <img class="loader-nails-img" src="nails.png" alt="💅">
    <span class="sp sp1">✦</span>
    <span class="sp sp2">✦</span>
    <span class="sp sp3">✦</span>
    <span class="sp sp4">✦</span>
    <span class="sp sp5">✦</span>
  </div>
  <div class="loader-text">opening your heart's archive 📓🐺</div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div class="app-header">
    <div class="header-row">
      <div>
        <div class="header-title">Journal 🐺</div>
        <div class="header-sub" id="headerSub">Your thoughts &amp; reflections</div>
      </div>
      <a href="index.html" class="back-btn">← Home</a>
    </div>

    <!-- Filter tabs -->
    <div class="filter-bar" style="margin-top:14px">
      <button class="filter-btn active" data-filter="all"        onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-filter="journal"    onclick="setFilter('journal')">📓 Journal</button>
      <button class="filter-btn"        data-filter="reflection" onclick="setFilter('reflection')">💬 Reflections</button>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>
</div>

<!-- New Entry FAB -->
<button class="fab" onclick="openNew()" id="fabBtn">✏️ New Entry</button>

<!-- Entry Overlay (create + edit) -->
<div id="entryOverlay" onclick="handleOverlayClick(event)">
  <div class="overlay-panel" id="overlayPanel">
    <div class="overlay-title" id="overlayTitle">New Entry</div>

    <div class="form-field">
      <label class="form-label" for="oDate">DATE</label>
      <input class="form-input" type="date" id="oDate">
    </div>

    <div class="form-field">
      <label class="form-label" for="oBody">ENTRY</label>
      <textarea class="form-textarea" id="oBody" rows="6"
                placeholder="What's on your mind today?"></textarea>
      <div class="form-error" id="bodyError">Entry text is required.</div>
    </div>

    <div class="form-field">
      <label class="form-label" for="oMood">MOOD <span>(optional)</span></label>
      <input class="form-input" type="text" id="oMood"
             placeholder="e.g. 😊 happy, 😴 tired, 💪 motivated">
    </div>

    <div class="form-field">
      <label class="form-label" for="oTags">TAGS <span>(optional, comma-separated)</span></label>
      <input class="form-input" type="text" id="oTags"
             placeholder="e.g. morning, gratitude, work">
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeOverlay()">Cancel</button>
      <button class="btn-save"   id="btnSave" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<script>
  /* ── Supabase config ─────────────────────────────────────────── */
  const SUPA_URL = 'https://oebxxurgxvzjnunjaujh.supabase.co';
  const SUPA_KEY = 'sb_publishable_x0QWqeNaNAFf7vN7Ky0Mzw_c_FMBAAP';
  const USER_ID  = 'ENID';

  /* ── Helpers ─────────────────────────────────────────────────── */
  async function sbGet(path) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function sbPost(table, body) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=representation',
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    const arr = await r.json();
    return arr[0];
  }

  async function sbPatch(path, body) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=representation',
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    const arr = await r.json();
    return arr[0];
  }

  async function sbDelete(path) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
        'Prefer': 'return=minimal',
      },
    });
    if (!r.ok) throw new Error(await r.text());
  }

  /* ── State ───────────────────────────────────────────────────── */
  let allItems     = [];    // merged + sorted feed
  let activeFilter = 'all';
  let habitMap     = {};    // habit_id → {name, emoji}
  let editingId    = null;  // null = creating new; string = editing existing

  /* ── Date helpers ────────────────────────────────────────────── */
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr.length === 10 ? dateStr + 'T12:00:00' : dateStr);
    const now = new Date();
    const today   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const itemDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((today - itemDay) / 86400000);

    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7)  return `${diffDays}d ago`;

    return d.toLocaleDateString('en-US', {
      month: 'short', day: 'numeric',
      year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
    });
  }

  // Longer label used in date-group separators
  function fmtDateSeparator(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr.length === 10 ? dateStr + 'T12:00:00' : dateStr);
    const now = new Date();
    const today   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const itemDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((today - itemDay) / 86400000);

    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined,
    });
  }

  function sortKey(item) {
    const primary   = item.entry_date || item.completed_on || '';
    const secondary = item.created_at || '';
    return primary + '_' + secondary;
  }

  /* ── Render helpers ──────────────────────────────────────────── */
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTags(tags) {
    if (!tags || !tags.length) return '';
    const arr = Array.isArray(tags)
      ? tags
      : String(tags).split(',').map(t => t.trim()).filter(Boolean);
    if (!arr.length) return '';
    return `<div class="card-tags">${arr.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>`;
  }

  function buildJournalCard(item) {
    const dateLabel = fmtDate(item.entry_date);
    const moodHtml  = item.mood ? `<span class="mood-chip">${escHtml(item.mood)}</span>` : '';
    const tagsHtml  = renderTags(item.tags);

    return `
      <div class="entry-card type-journal" data-id="${escHtml(item.id)}">
        <div class="card-meta">
          <span class="type-badge journal">📓 Journal</span>
          ${moodHtml}
          <span class="date-chip">${dateLabel}</span>
        </div>
        <div class="card-body">${escHtml(item.body || '')}</div>
        ${tagsHtml}
        <div class="card-actions">
          <button class="icon-btn edit"   onclick="openEdit('${escHtml(item.id)}')">✏️ Edit</button>
          <button class="icon-btn delete" onclick="deleteEntry('${escHtml(item.id)}')">🗑️ Delete</button>
        </div>
      </div>`;
  }

  function buildReflectionCard(item) {
    const dateLabel  = fmtDate(item.completed_on);
    const habit      = habitMap[item.habit_id];
    const habitLabel = habit ? `${habit.emoji} ${habit.name}` : item.habit_id || 'Habit';

    return `
      <div class="entry-card type-reflection">
        <div class="card-meta">
          <span class="type-badge reflection">💬 Reflection</span>
          <span class="habit-badge" title="${escHtml(habitLabel)}">${escHtml(habitLabel)}</span>
          <span class="date-chip">${dateLabel}</span>
        </div>
        <div class="card-body">${escHtml(item.note || '')}</div>
        <div class="reflection-source">🏠 from routine tracker</div>
      </div>`;
  }

  /* ── Filter & render feed ────────────────────────────────────── */
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    renderFeed();
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    const visible = allItems.filter(item => {
      if (activeFilter === 'all')        return true;
      if (activeFilter === 'journal')    return item._type === 'journal';
      if (activeFilter === 'reflection') return item._type === 'reflection';
      return true;
    });

    // Update header counts (always from full allItems)
    const jCount = allItems.filter(i => i._type === 'journal').length;
    const rCount = allItems.filter(i => i._type === 'reflection').length;
    document.getElementById('headerSub').textContent =
      `${jCount} ${jCount === 1 ? 'entry' : 'entries'} · ${rCount} ${rCount === 1 ? 'reflection' : 'reflections'}`;

    if (!visible.length) {
      const emptyConfig = {
        all: {
          icon: '🌙',
          title: 'Nothing here yet',
          sub: 'Tap <strong>✏️ New Entry</strong> below to write your first journal entry,<br>or add notes to habits in the routine tracker to see reflections here.',
        },
        journal: {
          icon: '📓',
          title: 'No journal entries yet',
          sub: 'Tap <strong>✏️ New Entry</strong> below to write your first one.',
        },
        reflection: {
          icon: '💬',
          title: 'No habit reflections yet',
          sub: 'After checking off a habit in the routine tracker,<br>you\'ll be prompted to add a note. Those notes appear here.',
        },
      };
      const cfg = emptyConfig[activeFilter] || emptyConfig.all;
      feed.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${cfg.icon}</div>
          <div class="empty-title">${cfg.title}</div>
          <div class="empty-sub">${cfg.sub}</div>
        </div>`;
      return;
    }

    // Build feed with date group separators
    const parts = [];
    let lastDateKey = null;
    for (const item of visible) {
      const dateKey = item.entry_date || item.completed_on || '';
      if (dateKey !== lastDateKey) {
        parts.push(`<div class="date-separator"><span>${fmtDateSeparator(dateKey)}</span></div>`);
        lastDateKey = dateKey;
      }
      parts.push(item._type === 'journal' ? buildJournalCard(item) : buildReflectionCard(item));
    }
    feed.innerHTML = parts.join('');
  }

  /* ── Overlay helpers ─────────────────────────────────────────── */
  function openNew() {
    editingId = null;
    document.getElementById('overlayTitle').textContent = '✏️ New Entry';
    document.getElementById('btnSave').textContent      = 'Save Entry';
    document.getElementById('oDate').value  = todayStr();
    document.getElementById('oBody').value  = '';
    document.getElementById('oMood').value  = '';
    document.getElementById('oTags').value  = '';
    document.getElementById('bodyError').classList.remove('show');
    showOverlay();
  }

  function openEdit(id) {
    const item = allItems.find(i => i.id === id && i._type === 'journal');
    if (!item) return;
    editingId = id;
    document.getElementById('overlayTitle').textContent = '✏️ Edit Entry';
    document.getElementById('btnSave').textContent      = 'Save Changes';
    document.getElementById('oDate').value = item.entry_date || todayStr();
    document.getElementById('oBody').value = item.body || '';
    document.getElementById('oMood').value = item.mood || '';
    // Normalise tags: array → comma-string for the input
    const tags = item.tags;
    document.getElementById('oTags').value = tags
      ? (Array.isArray(tags) ? tags.join(', ') : String(tags))
      : '';
    document.getElementById('bodyError').classList.remove('show');
    showOverlay();
  }

  function showOverlay() {
    document.getElementById('entryOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('oBody').focus(), 280);
  }

  function closeOverlay() {
    document.getElementById('entryOverlay').classList.remove('open');
    document.body.style.overflow = '';
    editingId = null;
  }

  function handleOverlayClick(e) {
    // Close when clicking the backdrop (not the panel itself)
    if (e.target === document.getElementById('entryOverlay')) closeOverlay();
  }

  /* ── Tags parsing ────────────────────────────────────────────── */
  function parseTags(raw) {
    if (!raw || !raw.trim()) return [];
    return raw.split(',').map(t => t.trim()).filter(Boolean);
  }

  /* ── Save (create or update) ─────────────────────────────────── */
  async function saveEntry() {
    const body = document.getElementById('oBody').value.trim();
    if (!body) {
      document.getElementById('bodyError').classList.add('show');
      document.getElementById('oBody').focus();
      return;
    }
    document.getElementById('bodyError').classList.remove('show');

    const date  = document.getElementById('oDate').value  || todayStr();
    const mood  = document.getElementById('oMood').value.trim() || null;
    const tags  = parseTags(document.getElementById('oTags').value);
    const btnSave = document.getElementById('btnSave');

    btnSave.disabled = true;
    btnSave.textContent = 'Saving…';

    try {
      if (editingId === null) {
        // ── CREATE ──────────────────────────────────────────────
        const payload = { user_id: USER_ID, body, entry_date: date, mood, tags };
        const created = await sbPost('journal_entries', payload);
        const newItem = { ...created, _type: 'journal' };
        allItems.push(newItem);
      } else {
        // ── UPDATE ──────────────────────────────────────────────
        const payload = { body, entry_date: date, mood, tags };
        const updated = await sbPatch(
          `journal_entries?id=eq.${editingId}&user_id=eq.${USER_ID}`, payload
        );
        const idx = allItems.findIndex(i => i.id === editingId);
        if (idx >= 0 && updated) {
          allItems[idx] = { ...allItems[idx], ...updated, _type: 'journal' };
        } else if (idx >= 0) {
          // fallback: apply locally if server returned nothing
          allItems[idx] = { ...allItems[idx], body, entry_date: date, mood, tags };
        }
      }

      // Re-sort after create/update
      allItems.sort((a, b) => sortKey(b).localeCompare(sortKey(a)));
      closeOverlay();
      renderFeed();

    } catch (err) {
      console.error('saveEntry error:', err);
      alert('Could not save entry: ' + (err.message || err));
      btnSave.disabled = false;
      btnSave.textContent = editingId ? 'Save Changes' : 'Save Entry';
    }
  }

  /* ── Delete ──────────────────────────────────────────────────── */
  async function deleteEntry(id) {
    if (!window.confirm('Delete this journal entry? This cannot be undone.')) return;

    // Optimistic remove
    const prev = [...allItems];
    allItems = allItems.filter(i => i.id !== id);
    renderFeed();

    try {
      await sbDelete(`journal_entries?id=eq.${id}&user_id=eq.${USER_ID}`);
    } catch (err) {
      console.error('deleteEntry error:', err);
      allItems = prev;
      renderFeed();
      alert('Could not delete entry: ' + (err.message || err));
    }
  }

  /* ── Init ────────────────────────────────────────────────────── */
  async function init() {
    try {
      const [habits, journalEntries, completions] = await Promise.all([
        sbGet(`habits?user_id=eq.${USER_ID}&select=id,name,emoji`),
        sbGet(`journal_entries?user_id=eq.${USER_ID}&order=entry_date.desc,created_at.desc`),
        sbGet(`habit_completions?user_id=eq.${USER_ID}&note=not.is.null&order=completed_on.desc,created_at.desc`),
      ]);

      habits.forEach(h => { habitMap[h.id] = { name: h.name, emoji: h.emoji }; });

      const tagged = [
        ...journalEntries.map(e => ({ ...e, _type: 'journal' })),
        ...completions.map(c => ({ ...c, _type: 'reflection' })),
      ];
      tagged.sort((a, b) => sortKey(b).localeCompare(sortKey(a)));
      allItems = tagged;
      renderFeed();

    } catch (err) {
      console.error('Journal init error:', err);
      document.getElementById('feed').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">Couldn't load journal</div>
          <div class="empty-sub">${escHtml(String(err.message || err))}</div>
        </div>`;
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('app').style.display = '';
    }
  }

  // Close overlay on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('entryOverlay').classList.contains('open')) {
      closeOverlay();
    }
  });

  init();
</script>
</body>
</html>
