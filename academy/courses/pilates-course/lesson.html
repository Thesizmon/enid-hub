<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson — Enid Academy</title>
<style>
  :root {
    --bg: radial-gradient(ellipse at 60% 40%, #F0E8FF 0%, #FFE8F4 50%, #EAF0FF 100%);
    --card: #FFFBF7;
    --card-r: 28px;
    --stage-bg: linear-gradient(175deg, #F4EEFF 0%, #FFF4FA 55%, #EEF4FF 100%);
    --accent: #E84EA0;
    --accent2: #C090F0;
    --title: #1A1630;
    --sub: #B0A0C8;
    --body-text: #5A4E72;
    --border: rgba(200, 130, 200, 0.12);
    --tag-bg: linear-gradient(135deg, #FCCEE8 0%, #D8CCFF 50%, #CCE0FF 100%);
    --tag-color: #6840A0;
    --shadow: 0 2px 0 rgba(255,255,255,0.9) inset, 0 8px 40px rgba(200,100,180,0.15), 0 2px 8px rgba(0,0,0,0.06);
    --shadow-sm: 0 2px 12px rgba(200,100,180,0.1), 0 1px 3px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding-bottom: 100px;
  }

  /* ─── PAGE NAV ───────────────────────────── */
  .page-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    max-width: 560px;
    margin: 0 auto;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn::before { content: "←"; font-size: 15px; }
  .step-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--tag-color);
    background: var(--tag-bg);
    padding: 4px 11px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ─── LESSON STEPPER ─────────────────────── */
  .stepper-wrap {
    width: 520px;
    max-width: calc(100vw - 32px);
    margin: 4px auto 14px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow-sm);
    padding: 16px 20px;
  }
  .stepper-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .stepper-label {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--accent);
  }
  .stepper-count { font-size: 11px; font-weight: 600; color: var(--sub); }
  .stepper-track { display: flex; align-items: center; gap: 6px; }
  .stepper-step {
    flex: 1; height: 6px; border-radius: 3px;
    background: rgba(200,150,220,0.15);
    transition: background 0.3s;
  }
  .stepper-step.done { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stepper-step.current { background: linear-gradient(90deg, var(--accent), var(--accent2)); opacity: 0.5; }
  .stepper-names {
    display: flex; justify-content: space-between; margin-top: 8px;
  }
  .stepper-name {
    font-size: 9.5px; font-weight: 600; color: var(--sub);
    flex: 1; text-align: center; letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .stepper-name:first-child { text-align: left; }
  .stepper-name:last-child { text-align: right; }
  .stepper-name.active { color: var(--tag-color); font-weight: 800; }

  /* ─── CARD ───────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--card-r);
    box-shadow: var(--shadow);
    padding: 24px 24px 20px;
    width: 520px;
    max-width: calc(100vw - 32px);
    margin: 0 auto 16px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .exercise-title { font-size: 21px; font-weight: 800; color: var(--title); letter-spacing: -0.4px; line-height: 1.1; }
  .exercise-sub { font-size: 11.5px; color: var(--sub); margin-top: 3px; font-weight: 500; letter-spacing: 0.3px; }
  .muscle-tag {
    background: var(--tag-bg); color: var(--tag-color);
    font-size: 11px; font-weight: 700; padding: 5px 13px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-left: 10px;
  }

  /* Stage (compact static for lesson) */
  .stage-compact {
    background: var(--stage-bg);
    border-radius: 16px;
    border: 1.5px solid rgba(200,130,200,0.1);
    overflow: hidden;
    aspect-ratio: 3 / 2;
    position: relative;
  }
  .stage-compact img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 4px 16px rgba(180,100,180,0.12));
  }
  .pose-label-static {
    position: absolute; bottom: 9px; left: 12px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; color: #C090D8;
    background: rgba(255,255,255,0.7); backdrop-filter: blur(6px);
    padding: 3px 9px; border-radius: 10px; pointer-events: none;
  }
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .rep-info { font-size: 13px; color: #9888B8; }
  .rep-info b { color: var(--accent); font-size: 17px; font-weight: 800; }
  .difficulty-chip {
    font-size: 11px; font-weight: 700; padding: 5px 12px;
    border-radius: 20px; background: rgba(232,78,160,0.1); color: var(--accent);
  }

  /* ─── SECTION CARDS ──────────────────────── */
  .section-card { padding: 22px 24px; }
  .section-title {
    font-size: 12px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
  }
  .body-text { font-size: 14px; line-height: 1.65; color: var(--body-text); }

  /* Focus list */
  .focus-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .focus-item {
    display: flex; gap: 12px; align-items: flex-start;
    background: linear-gradient(135deg, rgba(244,238,255,0.7), rgba(255,244,250,0.7));
    border: 1px solid rgba(200,150,220,0.12);
    border-radius: 14px; padding: 11px 14px;
  }
  .focus-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .focus-title { font-size: 13px; font-weight: 700; color: var(--title); margin-bottom: 2px; }
  .focus-desc { font-size: 12.5px; color: var(--body-text); line-height: 1.45; }

  /* Cues */
  .cues-list { display: flex; flex-direction: column; gap: 10px; }
  .cue-item {
    background: linear-gradient(135deg, rgba(244,238,255,0.8), rgba(255,244,250,0.8));
    border: 1px solid rgba(200,150,220,0.15);
    border-radius: 14px; padding: 11px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .cue-icon { font-size: 16px; flex-shrink: 0; }
  .cue-text { font-size: 13px; color: var(--body-text); font-style: italic; line-height: 1.4; }

  /* Rep grid */
  .rep-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-top: 14px;
  }
  .rep-cell {
    background: linear-gradient(160deg, rgba(244,238,255,0.9), rgba(255,244,250,0.9));
    border: 1px solid rgba(200,150,220,0.15);
    border-radius: 16px; padding: 14px 12px; text-align: center;
  }
  .rep-cell-num { font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1; }
  .rep-cell-label { font-size: 10.5px; font-weight: 600; color: var(--sub); margin-top: 4px; letter-spacing: 0.3px; }
  .rep-note {
    margin-top: 12px; font-size: 12.5px; color: var(--body-text);
    line-height: 1.5;
    background: rgba(232,78,160,0.05);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 12px 12px 0;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .chip { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; letter-spacing: 0.3px; }
  .chip-pink { background: rgba(232,78,160,0.1); color: var(--accent); }
  .chip-purple { background: rgba(192,144,240,0.12); color: #8050B8; }
  .chip-blue { background: rgba(140,160,240,0.12); color: #5060A8; }

  /* ─── BOTTOM LESSON NAV ──────────────────── */
  .lesson-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 20px;
    background: linear-gradient(to top, rgba(255,248,255,0.98) 60%, transparent);
    backdrop-filter: blur(10px);
    display: flex; justify-content: center;
  }
  .lesson-nav-inner { display: flex; gap: 10px; width: 520px; max-width: calc(100vw - 32px); }
  .btn-prev {
    background: var(--card); color: var(--tag-color);
    border: 1.5px solid rgba(200,150,220,0.3);
    border-radius: 20px; padding: 14px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: var(--shadow-sm); white-space: nowrap;
    transition: transform 0.15s, border-color 0.2s;
    text-decoration: none; display: flex; align-items: center;
  }
  .btn-prev:hover { border-color: var(--accent2); transform: translateY(-1px); }
  .btn-complete {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 20px;
    padding: 14px 20px; font-size: 14px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(232,78,160,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none; display: flex; align-items: center; justify-content: center;
  }
  .btn-complete:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,78,160,0.4); }
  .btn-complete:active { transform: scale(0.98); }
  .btn-next {
    background: var(--card); color: var(--tag-color);
    border: 1.5px solid rgba(200,150,220,0.3);
    border-radius: 20px; padding: 14px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: var(--shadow-sm); white-space: nowrap;
    transition: transform 0.15s, border-color 0.2s;
    text-decoration: none; display: flex; align-items: center;
  }
  .btn-next:hover { border-color: var(--accent2); transform: translateY(-1px); }
</style>
</head>
<body>
<script src="exercises.js"></script>

<nav class="page-nav">
  <a id="back-btn" href="home.html" class="back-btn">Enid Academy</a>
  <span id="step-badge" class="step-badge"></span>
</nav>

<div id="stepper-wrap" class="stepper-wrap" style="display:none">
  <div class="stepper-header">
    <span class="stepper-label">Your Progress</span>
    <span id="stepper-count" class="stepper-count"></span>
  </div>
  <div class="stepper-track" id="stepper-track"></div>
  <div class="stepper-names" id="stepper-names"></div>
</div>

<!-- Exercise card -->
<div id="ex-card" class="card" style="display:none">
  <div class="card-header">
    <div>
      <div class="exercise-title" id="ex-title"></div>
      <div class="exercise-sub" id="ex-sub"></div>
    </div>
    <div class="muscle-tag" id="ex-tag"></div>
  </div>
  <div class="stage-compact">
    <img id="ex-img" src="" alt="" draggable="false"/>
    <div class="pose-label-static" id="ex-pose-label"></div>
  </div>
  <div class="card-footer">
    <div class="rep-info" id="ex-rep-info"></div>
    <span class="difficulty-chip">⭐ Beginner</span>
  </div>
</div>

<!-- What You'll Learn -->
<div id="learn-card" class="card section-card" style="display:none">
  <div class="section-title">What You'll Learn</div>
  <p class="body-text" id="learn-about"></p>
  <ul class="focus-list" id="focus-list"></ul>
</div>

<!-- Cues -->
<div id="cues-card" class="card section-card" style="display:none">
  <div class="section-title">Coaching Cues</div>
  <div class="cues-list" id="cues-list"></div>
</div>

<!-- Reps & Sets -->
<div id="reps-card" class="card section-card" style="display:none">
  <div class="section-title">Reps &amp; Sets</div>
  <p class="body-text">Follow this prescription. Rest 45–60 seconds between sets.</p>
  <div class="rep-grid" id="rep-grid"></div>
  <div class="rep-note" id="rep-note"></div>
  <div class="chip-row" id="chip-row"></div>
</div>

<!-- Bottom nav -->
<div class="lesson-nav">
  <div class="lesson-nav-inner">
    <a id="btn-prev" href="home.html" class="btn-prev">← Back</a>
    <a id="btn-complete" href="home.html" class="btn-complete">✓ Mark Complete</a>
    <a id="btn-next" href="home.html" class="btn-next">Next →</a>
  </div>
</div>

<script>
function repString(ex) {
  const parts = [];
  if (ex.sets) parts.push('<b>' + ex.sets + '</b> sets');
  if (ex.reps) parts.push('<b>' + ex.reps + '</b> reps');
  if (ex.hold) parts.push('<b>' + ex.hold + '</b> hold');
  return parts.join(' · ');
}

// focus insights derived from first 3 cues
function buildFocusItems(ex) {
  const insights = [
    { icon: '🎯', title: ex.category + ' Foundation', desc: ex.about.split('.')[0] + '.' },
    { icon: '🧠', title: 'Mind-Body Connection', desc: 'Learn to feel the right muscles working — quality over quantity every rep.' },
    { icon: '😮‍💨', title: 'Breath Pattern', desc: ex.cues.find(c => c.icon === '🌬️' || c.icon === '😮‍💨')?.text.replace(/"/g, '') || 'Breathe continuously — never hold your breath to stabilise.' },
  ];
  return insights;
}

function render(ex, pl, exIdx) {
  document.title = ex.title + ' Lesson — Enid Academy';

  // Nav
  if (pl) {
    document.getElementById('back-btn').href = 'playlist.html?id=' + pl.id;
    document.getElementById('back-btn').textContent = pl.title;
    document.getElementById('step-badge').textContent = 'Lesson ' + (exIdx + 1) + ' of ' + pl.exercises.length;
  }

  // Stepper
  if (pl && pl.exercises.length > 1) {
    const wrap = document.getElementById('stepper-wrap');
    wrap.style.display = '';
    document.getElementById('stepper-count').textContent = (exIdx + 1) + ' of ' + pl.exercises.length + ' complete';
    const track = document.getElementById('stepper-track');
    const names = document.getElementById('stepper-names');
    pl.exercises.forEach((id, i) => {
      const step = document.createElement('div');
      step.className = 'stepper-step' + (i < exIdx ? ' done' : i === exIdx ? ' current' : '');
      track.appendChild(step);
      const nameEl = document.createElement('span');
      nameEl.className = 'stepper-name' + (i === exIdx ? ' active' : '');
      nameEl.textContent = EXERCISES[id]?.title || id;
      names.appendChild(nameEl);
    });
  }

  // Exercise card
  document.getElementById('ex-title').textContent = ex.title;
  document.getElementById('ex-sub').textContent = ex.subtitle;
  document.getElementById('ex-tag').textContent = ex.muscleTag;
  // Show the "end" frame for lesson (more instructive)
  const lessonFrame = ex.frameB || ex.frameA;
  document.getElementById('ex-img').src = lessonFrame;
  document.getElementById('ex-img').alt = ex.title;
  document.getElementById('ex-pose-label').textContent = ex.frameB ? (ex.labelB || 'End Position') : (ex.labelA || '');
  document.getElementById('ex-rep-info').innerHTML = repString(ex);
  document.getElementById('ex-card').style.display = '';

  // What you'll learn
  document.getElementById('learn-about').textContent = ex.about;
  const focusItems = buildFocusItems(ex);
  document.getElementById('focus-list').innerHTML = focusItems.map(f =>
    `<li class="focus-item"><span class="focus-icon">${f.icon}</span><div><div class="focus-title">${f.title}</div><div class="focus-desc">${f.desc}</div></div></li>`
  ).join('');
  document.getElementById('learn-card').style.display = '';

  // Cues
  if (ex.cues) {
    document.getElementById('cues-list').innerHTML = ex.cues.map(c =>
      `<div class="cue-item"><span class="cue-icon">${c.icon}</span><span class="cue-text">${c.text}</span></div>`
    ).join('');
    document.getElementById('cues-card').style.display = '';
  }

  // Reps & Sets
  const cells = [];
  if (ex.sets)  cells.push({ num: ex.sets,  label: 'Sets' });
  if (ex.reps)  cells.push({ num: ex.reps,  label: 'Reps' });
  if (ex.hold)  cells.push({ num: ex.hold,  label: 'Hold' });
  document.getElementById('rep-grid').innerHTML = cells.map(c =>
    `<div class="rep-cell"><div class="rep-cell-num">${c.num}</div><div class="rep-cell-label">${c.label}</div></div>`
  ).join('');
  document.getElementById('rep-note').textContent = '💡 Focus on form over speed — even one controlled rep is more valuable than ten sloppy ones.';
  const chipColors = ['chip-pink', 'chip-purple', 'chip-blue'];
  const chipLabels = [ex.muscleTag, ex.category, ex.primaryMuscles?.[0]].filter(Boolean);
  document.getElementById('chip-row').innerHTML = chipLabels.map((c, i) =>
    `<span class="chip ${chipColors[i % 3]}">${c}</span>`
  ).join('');
  document.getElementById('reps-card').style.display = '';

  // Bottom nav
  if (pl) {
    const prevId = exIdx > 0 ? pl.exercises[exIdx - 1] : null;
    const nextId = exIdx < pl.exercises.length - 1 ? pl.exercises[exIdx + 1] : null;
    const prevEx = prevId ? EXERCISES[prevId] : null;
    const nextEx = nextId ? EXERCISES[nextId] : null;

    const btnPrev = document.getElementById('btn-prev');
    btnPrev.href = prevEx ? `lesson.html?id=${prevEx.id}&playlist=${pl.id}&index=${exIdx - 1}` : `playlist.html?id=${pl.id}`;
    btnPrev.textContent = prevEx ? '← ' + prevEx.title : '← Playlist';

    const btnComplete = document.getElementById('btn-complete');
    btnComplete.href = nextEx
      ? `lesson.html?id=${nextEx.id}&playlist=${pl.id}&index=${exIdx + 1}`
      : `playlist.html?id=${pl.id}`;
    btnComplete.textContent = '✓ Mark Complete';

    const btnNext = document.getElementById('btn-next');
    btnNext.href = nextEx ? `lesson.html?id=${nextEx.id}&playlist=${pl.id}&index=${exIdx + 1}` : `playlist.html?id=${pl.id}`;
    btnNext.textContent = nextEx ? nextEx.title + ' →' : 'Finish →';
  }
}

// ── Boot ──────────────────────────────────────────────────────
const exId    = urlParam('id') || 'glute-bridge';
const plId    = urlParam('playlist');
const exIdx   = urlParam('index') !== null ? parseInt(urlParam('index')) : 0;
const ex      = getExercise(exId);
const pl      = plId ? getPlaylist(plId) : null;

if (ex) {
  render(ex, pl, exIdx);
} else {
  document.body.innerHTML = '<p style="text-align:center;padding:60px;color:var(--sub)">Exercise not found.</p>';
}
</script>
</body>
</html>
