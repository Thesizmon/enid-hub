<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Enid's Daily Tracker 🐺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --pink:   #E84EA0;
      --purple: #A855F7;
      --mint:   #6EE7B7;
      --amber:  #F59E0B;
      --cream:  #FFFBF7;
      --glass:  rgba(255,255,255,0.76);
      --border: rgba(168,85,247,0.13);
      --text:   #2D1B4E;
      --sub:    #7C6F9B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(ellipse at 15% 0%,   rgba(232,78,160,.18)  0%, transparent 55%),
        radial-gradient(ellipse at 85% 40%,  rgba(168,85,247,.12)  0%, transparent 55%),
        radial-gradient(ellipse at 40% 100%, rgba(110,231,183,.10) 0%, transparent 55%),
        #FFFBF7;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loader ────────────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 999;
      transition: opacity .35s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-wolf { font-size: 2.8rem; animation: bounce 1.1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .loader-text {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: var(--purple);
    }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

    /* ── Header ────────────────────────────────────────────────────── */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      padding: 22px 20px 14px;
      background: linear-gradient(180deg, rgba(255,251,247,.92) 70%, transparent);
      backdrop-filter: blur(10px);
    }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; line-height: 1.2;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-sub { font-size: .78rem; color: var(--sub); margin-top: 3px; }
    .date-chip {
      flex-shrink: 0;
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      color: var(--sub);
      background: rgba(168,85,247,.08);
      border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 20px;
      white-space: nowrap; margin-top: 2px;
    }

    /* ── Page nav links (header strip) ─────────────────────────────── */
    .header-nav { padding: 7px 0 0; display: flex; gap: 7px; flex-wrap: wrap; }
    .header-nav-link {
      font-size: .72rem; font-weight: 700; letter-spacing: .03em;
      color: var(--purple);
      background: rgba(168,85,247,.08); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px;
      text-decoration: none; white-space: nowrap;
      transition: background .15s;
    }
    .header-nav-link:hover { background: rgba(168,85,247,.18); }

    /* ── Manage link inside date items section header ────────────────── */
    .sec-manage-link {
      font-size: .72rem; font-weight: 700; color: var(--purple);
      text-decoration: none; opacity: .7;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .sec-manage-link:hover { opacity: 1; }

    /* ── Day nav strip ─────────────────────────────────────────────── */
    .day-nav {
      display: flex; gap: 5px;
      overflow-x: auto; padding: 2px 20px 14px;
      scrollbar-width: none;
    }
    .day-nav::-webkit-scrollbar { display: none; }

    .day-btn {
      flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 8px 11px;
      border-radius: 14px; cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .18s;
      min-width: 50px;
      user-select: none;
    }
    .day-btn:hover { background: rgba(168,85,247,.07); }
    .day-btn.weekend-day { background: rgba(245,158,11,.06); border-color: rgba(245,158,11,.2); }
    .day-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(168,85,247,.32);
    }

    .day-name {
      font-size: .6rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--sub);
    }
    .day-btn.active .day-name { color: rgba(255,255,255,.75); }
    .day-num  { font-size: .92rem; font-weight: 700; color: var(--text); }
    .day-btn.active .day-num  { color: #fff; }

    .day-dots { display: flex; gap: 3px; }
    .day-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(168,85,247,.18); transition: background .3s;
    }
    .day-dot.done    { background: var(--mint); }
    .day-dot.partial { background: var(--amber); }
    .day-btn.active .day-dot         { background: rgba(255,255,255,.35); }
    .day-btn.active .day-dot.done    { background: rgba(255,255,255,.95); }
    .day-btn.active .day-dot.partial { background: rgba(255,255,255,.65); }

    /* ── Sections container ────────────────────────────────────────── */
    #sections { padding: 0 14px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Section card ──────────────────────────────────────────────── */
    .section-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 18px rgba(168,85,247,.06);
    }
    .section-card.all-done {
      border-color: rgba(110,231,183,.45);
      box-shadow: 0 2px 18px rgba(110,231,183,.14);
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .sec-left { display: flex; align-items: center; gap: 10px; }
    .sec-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .sec-icon.morning  { background: linear-gradient(135deg, #FFF3D0, #FFE0A0); }
    .sec-icon.postwork { background: linear-gradient(135deg, #E0EEFF, #C7D9FF); }
    .sec-icon.evening  { background: linear-gradient(135deg, #EDE0FF, #D5C0FF); }
    .sec-icon.weekend  { background: linear-gradient(135deg, #FFE8F5, #FFCCEB); }
    .sec-icon.weekly   { background: linear-gradient(135deg, #D4FBF0, #A8F0E0); }
    .sec-icon.schedule { background: linear-gradient(135deg, #E8E0FF, #CFC4FF); }

    .sec-title { font-weight: 700; font-size: .92rem; }
    .sec-sub   { font-size: .7rem;  color: var(--sub); margin-top: 1px; }

    .sec-progress { text-align: right; }
    .sec-frac  { font-size: .78rem; font-weight: 700; color: var(--purple); }
    .sec-bar   { width: 54px; height: 4px; background: rgba(168,85,247,.12); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .sec-fill  { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; transition: width .35s ease; }

    /* ── Habit list ────────────────────────────────────────────────── */
    .habit-list { padding: 4px 0; }

    .habit-row {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 18px;
      cursor: pointer;
      transition: background .14s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .habit-row:hover  { background: rgba(168,85,247,.04); }
    .habit-row:active { background: rgba(168,85,247,.09); }

    .hc {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 7px;
      border: 2px solid rgba(168,85,247,.28);
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
      background: transparent;
    }
    .habit-row.done .hc {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(232,78,160,.38);
    }
    .hc-mark { color: #fff; font-size: .72rem; font-weight: 800; display: none; }
    .habit-row.done .hc-mark { display: block; }

    .h-emoji { font-size: 1.1rem; flex-shrink: 0; }

    .h-body  { flex: 1; min-width: 0; }
    .h-name  { font-size: .87rem; font-weight: 500; line-height: 1.3; }
    .habit-row.done .h-name { text-decoration: line-through; color: var(--sub); }

    /* Note indicator chip — shown on habits that have a saved note */
    .h-note-chip {
      display: inline-block;
      font-size: .58rem; font-weight: 700; letter-spacing: .03em;
      color: var(--purple);
      background: rgba(168,85,247,.1);
      border: 1px solid rgba(168,85,247,.22);
      padding: 1px 6px; border-radius: 6px;
      margin-left: 6px; vertical-align: middle;
      text-decoration: none !important; /* override strikethrough from .done */
    }

    .or-badge {
      display: inline-block;
      font-size: .58rem; font-weight: 800; letter-spacing: .06em;
      color: var(--amber);
      background: rgba(245,158,11,.12);
      border: 1px solid rgba(245,158,11,.28);
      padding: 1px 5px; border-radius: 4px;
      margin-left: 5px; vertical-align: middle;
    }

    .or-divider {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 18px;
    }
    .or-line  { flex: 1; height: 1px; background: rgba(245,158,11,.22); }
    .or-label {
      font-size: .62rem; font-weight: 800; letter-spacing: .1em;
      color: var(--amber);
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.22);
      padding: 2px 9px; border-radius: 20px;
    }

    .done-banner {
      text-align: center;
      padding: 12px 18px;
      font-size: .8rem; font-weight: 600;
      color: #059669;
      background: rgba(110,231,183,.1);
      border-top: 1px solid rgba(110,231,183,.3);
    }

    /* ── KT Shift ───────────────────────────────────────────────────── */
    .kt-set-chip {
      font-size: .62rem; font-weight: 700; letter-spacing: .04em;
      color: var(--amber);
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.22);
      padding: 3px 9px; border-radius: 10px;
      cursor: pointer; display: inline-block;
      margin-top: 6px; user-select: none;
    }
    .kt-set-chip:hover { background: rgba(245,158,11,.2); }

    .kt-banner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 10px 18px;
      background: rgba(245,158,11,.1);
      border-top: 1px solid rgba(245,158,11,.22);
      font-size: .8rem; font-weight: 600; color: #92400E;
    }
    .kt-banner-text { flex: 1; }
    .kt-remove-btn {
      font-size: .7rem; color: var(--amber); cursor: pointer;
      background: rgba(245,158,11,.15);
      border: 1px solid rgba(245,158,11,.3);
      padding: 3px 9px; border-radius: 8px;
      white-space: nowrap; user-select: none;
    }
    .kt-remove-btn:hover { background: rgba(245,158,11,.28); }

    .section-card.kt-active .habit-list {
      opacity: .3; pointer-events: none; user-select: none;
    }

    /* ── Date Items ─────────────────────────────────────────────────── */
    .date-items-list { padding: 4px 0; }

    .date-item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px 11px 15px;
      border-left: 3px solid var(--purple);
      transition: background .14s;
    }
    .date-item-row:not(:last-child) { border-bottom: 1px solid rgba(168,85,247,.07); }
    .date-item-row:hover { background: rgba(168,85,247,.03); }

    .di-type-icon { font-size: 1.15rem; flex-shrink: 0; width: 28px; text-align: center; }
    .di-body  { flex: 1; min-width: 0; }
    .di-title { font-size: .87rem; font-weight: 600; line-height: 1.3; color: var(--text); }
    .di-meta  {
      display: flex; align-items: center; flex-wrap: wrap;
      font-size: .71rem; color: var(--sub); margin-top: 3px; gap: 5px;
    }
    .di-time {
      background: rgba(168,85,247,.08);
      border: 1px solid rgba(168,85,247,.14);
      padding: 1px 7px; border-radius: 8px;
      font-weight: 600; font-size: .68rem; letter-spacing: .02em;
    }
    .di-sep { opacity: .4; }
    .di-loc { font-size: .71rem; color: var(--sub); }
    .di-repeat {
      font-size: .62rem; font-weight: 700; letter-spacing: .04em;
      color: var(--purple); background: rgba(168,85,247,.1);
      border: 1px solid rgba(168,85,247,.2);
      padding: 1px 6px; border-radius: 7px; white-space: nowrap;
    }
    .di-type-badge {
      flex-shrink: 0;
      font-size: .58rem; font-weight: 800; letter-spacing: .06em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 6px;
      border: 1px solid; white-space: nowrap;
    }

    /* ── Widgets (Step 5E) ──────────────────────────────────────────── */
    .widgets-divider {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 2px 2px;
    }
    .widgets-divider-line { flex: 1; height: 1px; background: var(--border); }
    .widgets-divider-label {
      font-size: .6rem; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; color: var(--sub);
      opacity: .6;
    }

    .widget-body {
      padding: 4px 18px 14px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .widget-empty {
      padding: 8px 18px 15px;
      font-size: .78rem; color: var(--sub); font-style: italic;
    }

    /* Finance widget */
    .wf-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .8rem;
    }
    .wf-label { color: var(--sub); }
    .wf-value { font-weight: 700; color: var(--text); }
    .wf-owed  { color: #DC2626; }
    .wf-avail-pos { color: #059669; }
    .wf-avail-neg { color: #DC2626; }
    .wf-bar {
      height: 5px; background: rgba(168,85,247,.1);
      border-radius: 3px; overflow: hidden; margin: 1px 0;
    }
    .wf-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mint), var(--amber));
      border-radius: 3px; transition: width .4s ease;
    }

    /* Books widget */
    .wb-title {
      font-size: .88rem; font-weight: 700; color: var(--text); line-height: 1.3;
    }
    .wb-meta { font-size: .72rem; color: var(--sub); }
    .wb-progress-bar {
      height: 4px; background: rgba(168,85,247,.1);
      border-radius: 2px; overflow: hidden;
    }
    .wb-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border-radius: 2px; transition: width .4s ease;
    }

    /* Movies widget */
    .wm-next { font-size: .83rem; color: var(--text); line-height: 1.3; }
    .wm-next strong { font-weight: 700; }
    .wm-more { font-size: .72rem; color: var(--sub); }

    /* ── Note Overlay (Step 5D) ─────────────────────────────────────── */
    .note-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 1;
      transition: opacity .22s ease;
    }
    .note-overlay.hidden {
      opacity: 0; pointer-events: none;
    }
    .note-overlay.hidden .note-sheet {
      transform: translateY(100%);
    }

    .note-backdrop {
      position: absolute; inset: 0;
      background: rgba(45,27,78,.38);
      backdrop-filter: blur(3px);
    }

    .note-sheet {
      position: relative; z-index: 1;
      width: 100%; max-width: 600px;
      background: var(--cream);
      border-radius: 24px 24px 0 0;
      padding: 18px 22px 38px;
      box-shadow: 0 -8px 40px rgba(168,85,247,.2);
      transform: translateY(0);
      transition: transform .28s cubic-bezier(.34,1.4,.64,1);
      display: flex; flex-direction: column; gap: 11px;
    }

    .note-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(168,85,247,.22);
      margin: 0 auto 2px;
    }

    .note-habit-row {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 13px;
      background: rgba(168,85,247,.06);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .note-emoji { font-size: 1.2rem; }
    .note-habit-name {
      font-size: .87rem; font-weight: 700; color: var(--text);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .note-prompt-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700; color: var(--text);
    }
    .note-prompt-sub {
      font-size: .72rem; color: var(--sub); margin-top: -5px;
    }

    .note-textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: .87rem; color: var(--text);
      background: rgba(255,255,255,.85);
      border: 1.5px solid rgba(168,85,247,.22);
      border-radius: 12px;
      padding: 12px 14px;
      resize: none; width: 100%; outline: none;
      transition: border-color .18s, box-shadow .18s;
      line-height: 1.55;
    }
    .note-textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(168,85,247,.1);
    }
    .note-textarea::placeholder { color: rgba(124,111,155,.45); }

    .note-footer {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .note-chars { font-size: .68rem; color: var(--sub); flex-shrink: 0; }

    .note-btns { display: flex; align-items: center; gap: 8px; }

    .note-btn-skip {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 600; color: var(--sub);
      background: transparent; border: none; cursor: pointer;
      padding: 8px 12px; border-radius: 10px;
      transition: background .15s;
    }
    .note-btn-skip:hover { background: rgba(168,85,247,.07); }

    .note-btn-save {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none; cursor: pointer;
      padding: 9px 20px; border-radius: 12px;
      box-shadow: 0 3px 12px rgba(232,78,160,.3);
      transition: opacity .15s, transform .1s;
    }
    .note-btn-save:hover  { opacity: .9; }
    .note-btn-save:active { transform: scale(.97); }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-wolf">🐺</div>
  <div class="loader-text">Loading your day...</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="app-header">
    <div class="header-row">
      <div>
        <div class="header-title" id="mainTitle">Your Daily Routines 🐺</div>
        <div class="header-sub"  id="mainSub"></div>
      </div>
      <div class="date-chip" id="dateChip"></div>
    </div>
    <div class="header-nav">
      <a href="date-items.html" class="header-nav-link">📅 Schedule</a>
      <a href="finance.html"    class="header-nav-link">💰 Finance</a>
      <a href="journal.html"    class="header-nav-link">📓 Journal</a>
      <a href="books.html"      class="header-nav-link">📚 Books</a>
    </div>
  </header>

  <div class="day-nav" id="dayNav"></div>
  <main id="sections"></main>
</div>

<!-- NOTE OVERLAY (Step 5D) -->
<div id="noteOverlay" class="note-overlay hidden" aria-hidden="true">
  <div class="note-backdrop" id="noteBackdrop"></div>
  <div class="note-sheet">
    <div class="note-handle"></div>
    <div class="note-habit-row">
      <span class="note-emoji"       id="noteEmoji"></span>
      <span class="note-habit-name"  id="noteHabitName"></span>
    </div>
    <div class="note-prompt-text">How'd it go? Add a reflection 💜</div>
    <div class="note-prompt-sub">Optional · saves to your journal history 🐺</div>
    <textarea id="noteTextarea" class="note-textarea"
      placeholder="Type something... or tap Skip 🐾"
      maxlength="500" rows="4"></textarea>
    <div class="note-footer">
      <span class="note-chars" id="noteChars">0 / 500</span>
      <div class="note-btns">
        <button class="note-btn-skip" id="noteSkip">Skip</button>
        <button class="note-btn-save" id="noteSave">Save note 💜</button>
      </div>
    </div>
  </div>
</div>

   CONFIG

const USER_ID  = 'ENID';

/* ─────────────────────────────────────────────────────────────────────
   DATE ITEM TYPE METADATA

const TYPE_META = {
  event:         { icon: '🎉', label: 'Event',       color: '#E84EA0', bg: 'rgba(232,78,160,.1)',   border: 'rgba(232,78,160,.28)' },

/* ─────────────────────────────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────────────────────────────── */
function fmtDate(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function isWeekend(d)  { return d.getDay() === 0 || d.getDay() === 6; }
function isViewToday() { return fmtDate(viewDate) === fmtDate(new Date()); }

function getWeekStart(d) {
  const date = new Date(d);
  const day  = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return fmtDate(date);
}

function fmtTime(t) {
  if (!t) return '';
  const parts = t.split(':');
  const hour  = parseInt(parts[0], 10);
  const min   = parts[1] || '00';
  const ampm  = hour >= 12 ? 'PM' : 'AM';
  const h12   = hour % 12 || 12;
  return `${h12}:${min} ${ampm}`;
}

/* ── Repeat-rule helpers (mirrors date-items.html) ────────────────── */
const REPEAT_LABELS = {
  daily:   '↺ Daily',
  weekly:  '↺ Weekly',
  monthly: '↺ Monthly',
  yearly:  '↺ Yearly',
};

function _parseDL(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function _fmtDL(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function _nextOcc(d, rule) {
  const n = new Date(d);
  if      (rule === 'daily')   n.setDate(n.getDate() + 1);
  else if (rule === 'weekly')  n.setDate(n.getDate() + 7);
  else if (rule === 'monthly') n.setMonth(n.getMonth() + 1);
  else if (rule === 'yearly')  n.setFullYear(n.getFullYear() + 1);
  return n;
}

/**
 * From source items (already pre-filtered to item_date <= dateStr),
 * return the subset whose occurrence actually falls on dateStr.
 */
function getItemsForDate(sourceItems, dateStr) {
  const target = _parseDL(dateStr);
  const out    = [];
  for (const item of sourceItems) {
    const rule = item.repeat_rule;
    if (!rule || rule === 'none') {
      if (item.item_date === dateStr) out.push(item);
      continue;
    }
    // Walk occurrences from the base date up to dateStr
    let occ    = new Date(_parseDL(item.item_date));
    let safety = 0;
    while (occ <= target && safety < 800) {
      if (_fmtDL(occ) === dateStr) { out.push(item); break; }
      occ = _nextOcc(occ, rule);
      safety++;
    }
  }
  return out;
}

/* ─────────────────────────────────────────────────────────────────────
   SUPABASE
───────────────────────────────────────────────────────────────────── */
const SB_HEADS = {
  'apikey':        SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=minimal',
};

async function sbGet(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: SB_HEADS });
  if (!r.ok) throw new Error(`sbGet ${path} → ${r.status}`);
  return r.json();
}
async function sbInsert(table, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST', headers: SB_HEADS, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`sbInsert ${table} → ${r.status}`);
}
async function sbPatch(table, qs, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${qs}`, {
    method: 'PATCH', headers: SB_HEADS, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`sbPatch ${table} → ${r.status}`);
}
async function sbDelete(table, qs) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${qs}`, {
    method: 'DELETE', headers: SB_HEADS,
  });
  if (!r.ok) throw new Error(`sbDelete ${table} → ${r.status}`);
}

/**
 * Finance widget: find the active pay period (is_current = true),
 * sum all non-paid obligations, compute net available.
 */
async function loadFinanceWidget() {
  try {
    const periods = await sbGet(
      `pay_periods?user_id=eq.${USER_ID}&is_current=eq.true&limit=1`
    );
    if (!periods.length) { financeWidget = null; return; }
    const period = periods[0];

    const obligs = await sbGet(
      `finance_obligations?user_id=eq.${USER_ID}&period_id=eq.${period.id}&select=amount,is_variable,is_paid_off,spent_amount`
    );

    const income    = (period.income_bbs || 0) + (period.income_kt || 0);
    // For variable items, use spent_amount if tracked; otherwise use budget amount
    const totalOwed = obligs
      .filter(o => !o.is_paid_off)
      .reduce((s, o) => {
        const eff = (o.is_variable && o.spent_amount !== null && o.spent_amount !== undefined)
          ? Number(o.spent_amount)
          : Number(o.amount) || 0;
        return s + eff;
      }, 0);

    financeWidget = {
      period,
      income,
      totalOwed,
      available: income - totalOwed,
    };
  } catch(e) {
    console.warn('Finance widget load failed:', e.message);
    financeWidget = null;
  }
}

/* ─────────────────────────────────────────────────────────────────────
   TOGGLE — daily habits
───────────────────────────────────────────────────────────────────── */
async function toggleHabit(habitId) {
  const dateStr = fmtDate(viewDate);

  if (dayCompletions.has(habitId)) {
    /* ── uncheck: delete completion + clear any local note ── */
    dayCompletions.delete(habitId);
    delete dayNotes[habitId];
    render();
    await sbDelete(
      'habit_completions',
      `user_id=eq.${USER_ID}&habit_id=eq.${encodeURIComponent(habitId)}&completed_on=eq.${dateStr}`
    );
  } else {
    /* ── check: insert, then show note prompt ── */
    dayCompletions.add(habitId);
    render();
    showNotePrompt(habitId, dateStr);          // slide up immediately (optimistic)
    pendingInsert = sbInsert('habit_completions', {
      user_id: USER_ID, habit_id: habitId, completed_on: dateStr,
    });
    await pendingInsert;
    pendingInsert = null;
  }

  buildDayNav();
}

/* ─────────────────────────────────────────────────────────────────────
   TOGGLE — weekly habits (weekend_tasks, no note support yet)
───────────────────────────────────────────────────────────────────── */
async function toggleWeeklyHabit(habitId) {
  const weekStartStr = getWeekStart(viewDate);

  if (weeklyDone.has(habitId)) {
    weeklyDone.delete(habitId);
    render();
    await sbDelete(
      'weekend_tasks',
      `user_id=eq.${USER_ID}&habit_id=eq.${encodeURIComponent(habitId)}&week_start=eq.${weekStartStr}`
    );
  } else {
    weeklyDone.add(habitId);
    render();
    await sbInsert('weekend_tasks', {
      user_id: USER_ID, habit_id: habitId,
      week_start: weekStartStr, completed_at: fmtDate(viewDate),
    });
    // Note prompts not yet supported for weekly habits (no note column in weekend_tasks)
  }

  buildDayNav();
}

async function toggleKTShift() {

/* ─────────────────────────────────────────────────────────────────────
   NOTE OVERLAY (Step 5D)
───────────────────────────────────────────────────────────────────── */
function showNotePrompt(habitId, dateStr) {
  const habit = habits.find(h => h.id === habitId);
  if (!habit) return;

  pendingNote = { habitId, dateStr };

  document.getElementById('noteEmoji').textContent     = habit.emoji || '•';
  document.getElementById('noteHabitName').textContent = habit.name;
  document.getElementById('noteTextarea').value        = '';
  document.getElementById('noteChars').textContent     = '0 / 500';

  const overlay = document.getElementById('noteOverlay');
  overlay.classList.remove('hidden');
  overlay.setAttribute('aria-hidden', 'false');

  // Auto-focus textarea after slide animation starts
  setTimeout(() => document.getElementById('noteTextarea').focus(), 120);
}

function hideNotePrompt() {
  const overlay = document.getElementById('noteOverlay');
  overlay.classList.add('hidden');
  overlay.setAttribute('aria-hidden', 'true');
  pendingNote = null;
}

async function saveNote() {
  if (!pendingNote) return;
  const text                  = document.getElementById('noteTextarea').value.trim();
  const { habitId, dateStr }  = pendingNote;
  hideNotePrompt();

  if (!text) return; // nothing to save — treat same as skip

  // Optimistic: update local notes + re-render so chip appears immediately
  dayNotes[habitId] = text;
  render();

  try {
    // Ensure the INSERT has completed before we PATCH it
    if (pendingInsert) await pendingInsert;
    await sbPatch(
      'habit_completions',
      `user_id=eq.${USER_ID}&habit_id=eq.${encodeURIComponent(habitId)}&completed_on=eq.${dateStr}`,
      { note: text }
    );
  } catch(e) {
    console.error('Failed to save note:', e);
    delete dayNotes[habitId];
    render();
  }
}

/* ─────────────────────────────────────────────────────────────────────
   PROGRESS
───────────────────────────────────────────────────────────────────── */
function calcProgress(habitList, doneSet) {
  const orGroupDone = {};
  let total = 0, done = 0;

  habitList.forEach(h => {
    if (h.or_group) {
      if (!(h.or_group in orGroupDone)) { orGroupDone[h.or_group] = false; total++; }
      if (doneSet.has(h.id)) orGroupDone[h.or_group] = true;
    } else {
      total++;
      if (doneSet.has(h.id)) done++;
    }
  });

  Object.values(orGroupDone).forEach(v => { if (v) done++; });
  return { done, total };
}

  updateHeader();
  const container = document.getElementById('sections');
  container.innerHTML = '';

  // Date items card at top (only when items exist)
  if (dateItems.length) container.appendChild(buildDateItemsCard());

  // Habit sections
  getSections().forEach(sec => {
    if (!sec.habits.length) return;

    const { done, total } = calcProgress(sec.habits, sec.doneSet);
    const pct     = total ? (done / total) * 100 : 0;
    const allDone = done === total && total > 0;
    const isKT    = !!(sec.ktSection && ktShiftToday);

    const card = document.createElement('div');
    card.className = `section-card${allDone ? ' all-done' : ''}${isKT ? ' kt-active' : ''}`;

    const ktChipHtml = (sec.ktSection && !ktShiftToday)
      ? `<div class="kt-set-chip">🏪 KT Shift</div>` : '';

    card.innerHTML = `
      <div class="section-header">
        <div class="sec-left">
          <div class="sec-icon ${sec.color}">${sec.icon}</div>
          <div>
            <div class="sec-title">${sec.label}</div>
            <div class="sec-sub">${sec.sub}</div>
          </div>
        </div>
        <div class="sec-progress">
          <div class="sec-frac">${done}/${total}</div>
          <div class="sec-bar"><div class="sec-fill" style="width:${pct}%"></div></div>
          ${ktChipHtml}
        </div>
      </div>
      ${isKT ? `
      <div class="kt-banner">
        <span class="kt-banner-text">🏪 KT Shift today — postwork routine skipped</span>
        <span class="kt-remove-btn">Remove</span>
      </div>` : ''}
      <div class="habit-list" id="hl_${sec.key}"></div>
    `;
    container.appendChild(card);

    if (sec.ktSection) {
      const setChip   = card.querySelector('.kt-set-chip');
      const removeBtn = card.querySelector('.kt-remove-btn');
      if (setChip)   setChip.addEventListener('click',   e => { e.stopPropagation(); toggleKTShift(); });
      if (removeBtn) removeBtn.addEventListener('click', e => { e.stopPropagation(); toggleKTShift(); });
    }

    const list    = document.getElementById(`hl_${sec.key}`);
    const orShown = {};

    sec.habits.forEach(h => {
      if (h.or_group && !orShown[h.or_group]) {
        list.appendChild(mkOrDivider('DO ONE'));
        orShown[h.or_group] = true;
      }

      const checked  = sec.doneSet.has(h.id);
      // Note chip: shown for daily habits with a saved reflection
      const hasNote  = !!(h.section !== 'weekly' && dayNotes[h.id]);
      const noteHtml = hasNote ? '<span class="h-note-chip">💜 note</span>' : '';

      const row = document.createElement('div');
      row.className = `habit-row${checked ? ' done' : ''}`;
      row.innerHTML = `
        <div class="hc"><span class="hc-mark">✓</span></div>
        <div class="h-emoji">${h.emoji || '•'}</div>
        <div class="h-body">
          <div class="h-name">${h.name}${h.or_group ? '<span class="or-badge">OR</span>' : ''}${noteHtml}</div>
        </div>
      `;
      row.addEventListener('click', () => {
        if (h.section === 'weekly') toggleWeeklyHabit(h.id);
        else                        toggleHabit(h.id);
      });
      list.appendChild(row);

      const groupHabits = sec.habits.filter(s => s.or_group === h.or_group);
      if (h.or_group && h.id === groupHabits[groupHabits.length - 1].id) {
        list.appendChild(mkOrDivider(null));
      }
    });

    if (allDone) {
      const banner = document.createElement('div');
      banner.className = 'done-banner';
      banner.textContent = '✨ Section complete — nice work! 🐺';
      card.appendChild(banner);
    }
  });

  // ── Secondary signals (widgets) — rendered after all habit sections ──
  const finCard  = buildFinanceWidgetCard();
  const bookCard = buildBooksWidgetCard();
  const movCard  = buildMoviesWidgetCard();

  if (finCard || bookCard || movCard) {
    // Divider label
    const divider = document.createElement('div');
    divider.className = 'widgets-divider';
    divider.innerHTML = `
      <div class="widgets-divider-line"></div>
      <div class="widgets-divider-label">Secondary Signals</div>
      <div class="widgets-divider-line"></div>
    `;
    container.appendChild(divider);
    if (finCard)  container.appendChild(finCard);
    if (bookCard) container.appendChild(bookCard);
    if (movCard)  container.appendChild(movCard);
  }
}

function mkOrDivider(label) {
  const el = document.createElement('div');
  el.className = 'or-divider';
  el.innerHTML = label
    ? `<div class="or-line"></div><div class="or-label">${label}</div><div class="or-line"></div>`
    : `<div class="or-line"></div>`;
  return el;
}

/* ─────────────────────────────────────────────────────────────────────
   HEADER
───────────────────────────────────────────────────────────────────── */
function updateHeader() {
  const weekend = isWeekend(viewDate);
  const isToday = isViewToday();
  const today   = new Date();

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  document.getElementById('mainTitle').textContent =
    weekend ? 'Weekend Mode 🌸🐺' : 'Your Daily Routines 🐺';

  document.getElementById('mainSub').textContent = isToday
    ? (weekend ? "It's the weekend — breathe, build & be present 🌈"
               : 'Show up for yourself today, one habit at a time 💜')
    : `Viewing ${DAYS[viewDate.getDay()]} the ${viewDate.getDate()} — ${weekend ? 'weekend' : 'weekday'}`;

  document.getElementById('dateChip').textContent =
    `${DAYS[today.getDay()]}, ${MONTHS[today.getMonth()]} ${today.getDate()}`;
}

/* ─────────────────────────────────────────────────────────────────────
   DAY NAV
───────────────────────────────────────────────────────────────────── */
async function buildDayNav() {
  const dates    = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d;
  });
  const dateStrs = dates.map(fmtDate);

  let byDate = {};
  try {
    const rows = await sbGet(
      `habit_completions?user_id=eq.${USER_ID}&completed_on=in.(${dateStrs.join(',')})&select=habit_id,completed_on`
    );
    rows.forEach(r => { byDate[r.completed_on] = (byDate[r.completed_on] || 0) + 1; });
  } catch(e) {}

  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';

  dates.forEach(d => {
    const dk      = fmtDate(d);
    const weekend = isWeekend(d);
    const isView  = dk === fmtDate(viewDate);
    const pct     = (byDate[dk] || 0) / (weekend ? 12 : 23);

    const btn = document.createElement('div');
    btn.className = `day-btn${isView ? ' active' : ''}${weekend && !isView ? ' weekend-day' : ''}`;
    btn.innerHTML = `
      <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-dots">
        <div class="day-dot ${pct >= .40 ? 'done' : pct >= .15 ? 'partial' : ''}"></div>
        <div class="day-dot ${pct >= .65 ? 'done' : pct >= .35 ? 'partial' : ''}"></div>
        <div class="day-dot ${pct >= .90 ? 'done' : pct >= .60 ? 'partial' : ''}"></div>
      </div>
    `;

    btn.addEventListener('click', async () => {
      if (isView) return;
      viewDate = new Date(dk + 'T12:00:00');
      const weekStartStr = getWeekStart(viewDate);
      // Finance/books/movies don't change per day — no need to reload on nav
      await Promise.all([
        loadCompletions(dk),
        loadWeeklyCompletions(weekStartStr),
        loadKTShift(dk),
        loadDateItems(dk),
      ]);
      render();
      buildDayNav();
    });

    nav.appendChild(btn);
  });

  const active = nav.querySelector('.day-btn.active');
  if (active) nav.scrollLeft = active.offsetLeft - nav.offsetWidth / 2 + active.offsetWidth / 2;
}

/* ─────────────────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────────────────── */
async function init() {
  try {
    const dateStr      = fmtDate(viewDate);
    const weekStartStr = getWeekStart(viewDate);
    // Load habits first (sections depend on it), then all per-day + widget data in parallel
    await loadHabits();
    loadMoviesWidget(); // synchronous localStorage read
    await Promise.all([
      loadCompletions(dateStr),
      loadWeeklyCompletions(weekStartStr),
      loadKTShift(dateStr),
      loadDateItems(dateStr),
      loadFinanceWidget(),
      loadBooksWidget(),
    ]);
    render();
    await buildDayNav();
  } catch (err) {
    console.error('Init failed:', err);
    document.getElementById('loader').innerHTML = `
      <div class="loader-wolf">😵</div>
      <div class="loader-text">Couldn't load — check your connection and refresh.</div>
    `;
    return;
  }
  const loader = document.getElementById('loader');
  loader.classList.add('hidden');
  setTimeout(() => {
    loader.style.display = 'none';
    document.getElementById('app').style.display = '';
  }, 380);
}

/* ─────────────────────────────────────────────────────────────────────
   NOTE OVERLAY EVENT LISTENERS (wired once at startup)
───────────────────────────────────────────────────────────────────── */
document.getElementById('noteSkip').addEventListener('click', hideNotePrompt);
document.getElementById('noteSave').addEventListener('click', saveNote);
document.getElementById('noteBackdrop').addEventListener('click', hideNotePrompt);
document.getElementById('noteTextarea').addEventListener('input', function () {
  document.getElementById('noteChars').textContent = `${this.value.length} / 500`;
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideNotePrompt();
});

init();
</script>
